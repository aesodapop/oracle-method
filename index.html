<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oracle Method — Buffett-Grade Stock Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{background:#0a0a08;color:#e8e4d8;font-family:'IBM Plex Sans',sans-serif;margin:0}
.header{padding:20px 30px;border-bottom:1px solid #2a2a26;display:flex;justify-content:space-between}
.logo{font-family:'Playfair Display',serif;font-weight:900;color:#c9a84c;font-size:22px}
.search{display:flex;gap:10px}
input{background:#111110;border:1px solid #2a2a26;color:white;padding:8px 12px}
button{background:#c9a84c;border:none;padding:8px 14px;font-weight:600;cursor:pointer}
.container{padding:30px;max-width:1100px;margin:auto}
.metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-top:20px}
.card{background:#111110;padding:16px;border:1px solid #2a2a26}
.metric-title{color:#9a9688;font-size:12px}
.metric-value{font-size:20px;margin-top:6px}
</style>
</head>

<body>

<div class="header">
<div class="logo">Oracle Method</div>

<div class="search">
<input id="ticker" placeholder="Enter ticker (AAPL)" />
<button onclick="loadStock()">Analyze</button>
</div>
</div>

<div class="container">

<h2 id="companyName">Search a company</h2>

<div class="metrics" id="metrics"></div>

</div>

<script>

// -----------------------------
// CONFIG
// -----------------------------

// 🔁 REPLACE WITH YOUR VERCEL URL
const BASE_URL = "https://your-vercel-api.vercel.app/api/stock";


// -----------------------------
// LOAD STOCK DATA (NOW VIA YOUR BACKEND)
// -----------------------------

async function loadStock(){

const ticker = document.getElementById("ticker").value.toUpperCase();

if(!ticker) return;

try{

const res = await fetch(`${BASE_URL}?ticker=${ticker}`);
const data = await res.json();

if(!data || !data.profile){
alert("No data found");
return;
}

renderData(data.profile, data.metrics, data.ratios);

}catch(e){
console.error(e);
alert("Error loading data");
}

}


// -----------------------------
// RENDER METRICS
// -----------------------------

function renderData(profile, metrics, ratios){

const container = document.getElementById("metrics");
container.innerHTML = "";


const data = [

["Price", profile.price ? `$${profile.price.toFixed(2)}` : "-"],
["Market Cap", profile.mktCap ? formatNumber(profile.mktCap) : "-"],
["ROIC", percent(metrics?.roic)],
["ROE", percent(ratios?.returnOnEquity)],
["Operating Margin", percent(ratios?.operatingProfitMargin)],
["FCF / Share", metrics?.freeCashFlowPerShare ? `$${metrics.freeCashFlowPerShare.toFixed(2)}` : "-"],
["Debt / Equity", ratios?.debtEquityRatio ? ratios.debtEquityRatio.toFixed(2) : "-"],
["PE Ratio", ratios?.priceEarningsRatio ? ratios.priceEarningsRatio.toFixed(2) : "-"]

];


for(const item of data){

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<div class="metric-title">${item[0]}</div>
<div class="metric-value">${item[1]}</div>
`;

container.appendChild(card);
}


document.getElementById("companyName").innerText = `${profile.companyName} (${profile.symbol})`;

}


// -----------------------------
// HELPERS
// -----------------------------

function percent(val){
if(!val) return "-";
return (val*100).toFixed(1)+"%";
}

function formatNumber(num){

if(num > 1e12) return (num/1e12).toFixed(2)+"T";
if(num > 1e9) return (num/1e9).toFixed(2)+"B";
if(num > 1e6) return (num/1e6).toFixed(2)+"M";

return num;

}

</script>

</body>
</html>
